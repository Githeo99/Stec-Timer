<!DOCTYPE html>
<html>
    <head>
        <style type="text/css">
        
            :root {
                --stec-font: "Open Sans", "urw-din", sans-serif;
                --stec-text-color: #ffff00;
                --stec-bg-color: #003399;
        
            }
        
            div#timer_caption, div#timer_container > div#timer_box {
                background-color: var(--stec-bg-color);
            }

            div#timer_caption {

                display: flex;
                justify-content: space-between;
                padding: 2.5%;
                max-width: 100%;
                
            }
        
            div#timer_caption h1 {
                font-family: var(--stec-font);
                color: var(--stec-text-color);
                text-align: center;
            }
        
            div#timer_container h1 {
        		width: 35%;
        		height: 50px;
        		align-self: end;
        		margin: 0;
        		text-align: center;
        		inset-inline-start: 30px;
        	}
        
        	div#timer_container p {
        		font-size: 1.25rem;
        		margin: 0;
        		line-height: 50px;
        	}
        
        	div#timer_container p.timer_values, p.separators {
        		font-size: 3rem;
        	}
        
        	div#timer_container #header_caption {
        		display: flex;
        		width: 70%;
        		min-width: 300px;
        		margin: auto;
        		justify-content: space-evenly;
        	}
        
        	div#timer_container .header_lines {
        		width: 20%;
        		height: 100px;
        		background-color: black;
        		clip-path: inset(75px 0 20px 0);
        	}
        
        
        	div#timer_container {
                font-family: var(--stec-font);
        		display: flex;
        		width: 70%;
        		min-width: 300px;
        		height: 200px;
        		margin: auto;
        		justify-content: center;
        		box-sizing: border-box;
        		z-index: 0;
        	}
        
        	div#timer_container #timer_box {
        		display: flex;
        		width: 93.75%;
        		min-width: 281.25px;
        		height: 150px;
        		margin: auto;
        		background-color: white;
        		justify-content: center;
        		align-items: center;
        		z-index: 2;
        	}
        
        	div#timer_container .timer_cells {
        		display: inline;
        		width: 130px;
        		text-align: center;
        	}
        
            div#timer_caption, div#timer_container div#timer_box {
                padding: 5px;
            }
        
        	div#timer_container .timer_cells p {
        		color: var(--stec-text-color);
        	}
        
        	div#timer_container .separator_cells {
        		width: 6.25%;
        		text-align: center;
        		margin: 25px 0;
        		align-self: stretch;
        	}
        
        	div#timer_container .separators::after {
        		content: ":";
                color: var(--stec-text-color);
        		font-size: 2.5rem;
        	}
        
        	@media only screen and (max-width: 1200px) {
        		div#timer_container p {
        			font-size: 1rem;
        		}
            
        		div#timer_container h1 {
        			font-size: 1.7rem;
        		}
        	}
        
        	@media only screen and (max-width: 1000px) {
            
        		div#timer_container h1 {
        			font-size: 1.15rem;
        		}
        	}
        </style>

    </head>

    <body>
        <div id="timer_caption">
            <img src="Assets/Img/openclipart-vectors-norway-162381_640.png" width="100" height="auto" alt="Image by OpenClipart-Vectors from Pixabay" />
            <h1>STEC RACE #2 SVIESTAD 2026</h1>
            <img src="Assets/Img/openclipart-vectors-sweden-154401_640 (1).png" width="100" height="auto" alt="Image by OpenClipart-Vectors from Pixabay" />
        </div>

        <div id="timer_container">
            <div id="timer_box">
                <div class="timer_cells">
                    <p class="timer_values">&nbsp;</p>
                    <p>Days</p>
                </div>

                <div class="separator_cells">
                    <p class="separators">&nbsp;</p>
                </div>

                <div class="timer_cells">
                    <p class="timer_values">&nbsp;</p>
                    <p>Hours</p>
                </div>

                <div class="separator_cells">
                    <p class="separators">&nbsp;</p>
                </div>

                <div class="timer_cells">
                    <p class="timer_values">&nbsp;</p>
                    <p>Minutes</p>
                </div>

                <div class="separator_cells">
                    <p class="separators">&nbsp;</p>
                </div>

                <div class="timer_cells">
                    <p class="timer_values">&nbsp;</p>
                    <p>Seconds</p>
                </div>
            </div>
        </div>

        <script id="kc-timer-script">
        	var timerText = document.getElementsByClassName("timer_values");
        	var finalDate = new Date(2026, 4, 16, 9, 0, 0, 0);
        
        	var x = setInterval(
        		function () { 
        			let currentDate = new Date();
                
        			let currentTime = currentDate.getTime();
        			let utcOffset = currentDate.getTimezoneOffset() + 60;
                
        			let diffTime = finalDate.getTime() - currentTime - (utcOffset * 60 * 1000); //Time difference in milliseconds
                
        			let days = parseInt(diffTime / (24 * 3600 * 1000));
        			let hours = parseInt(diffTime / (3600 * 1000)) % 24;
        			let minutes = parseInt(diffTime / (60 * 1000)) % 60;
        			let seconds = parseInt(diffTime / 1000) % 60;
                
        			let time = [days, hours, minutes, seconds];
                
        			for (let x of time) {
        				if (x < 10) {
        					time[time.indexOf(x)] = "0" + String(x);
                        
        				}
        			}
                
        			timerText[0].innerHTML = time[0];
        			timerText[1].innerHTML = time[1];
        			timerText[2].innerHTML = time[2];
        			timerText[3].innerHTML = time[3];
                
        			if (diffTime < 0) {
        				clearInterval(x);
        				timerText[0].innerHTML = "00"; //Force timer to stay at zero
        				timerText[1].innerHTML = "00";
        				timerText[2].innerHTML = "00";
        				timerText[3].innerHTML = "00";
        			}
                
        		}, 1000);
            
        </script>
    </body>
</html>
