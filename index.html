<!DOCTYPE html>
<html>
    <head>
		<link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div id="timer_caption">
            <h1>STEC RACE #2 SVIESTAD 2026</h1>
        </div>

        <div id="timer_container">
            <div id="timer_box">
                <div class="timer_cells">
                    <p class="timer_values">&nbsp;</p>
                    <p>Days</p>
                </div>

                <div class="separator_cells">
                    <p class="separators">&nbsp;</p>
                </div>

                <div class="timer_cells">
                    <p class="timer_values">&nbsp;</p>
                    <p>Hours</p>
                </div>

                <div class="separator_cells">
                    <p class="separators">&nbsp;</p>
                </div>

                <div class="timer_cells">
                    <p class="timer_values">&nbsp;</p>
                    <p>Minutes</p>
                </div>

                <div class="separator_cells">
                    <p class="separators">&nbsp;</p>
                </div>

                <div class="timer_cells">
                    <p class="timer_values">&nbsp;</p>
                    <p>Seconds</p>
                </div>
            </div>
        </div>

        <script id="kc-timer-script">
        	var timerText = document.getElementsByClassName("timer_values");
        	var finalDate = new Date(2026, 4, 16, 9, 0, 0, 0);
        
        	var x = setInterval(
        		function () { 
        			let currentDate = new Date();
                
        			let currentTime = currentDate.getTime();
        			let utcOffset = currentDate.getTimezoneOffset() + 60;
                
        			let diffTime = finalDate.getTime() - currentTime - (utcOffset * 60 * 1000); //Time difference in milliseconds
                
        			let days = parseInt(diffTime / (24 * 3600 * 1000));
        			let hours = parseInt(diffTime / (3600 * 1000)) % 24;
        			let minutes = parseInt(diffTime / (60 * 1000)) % 60;
        			let seconds = parseInt(diffTime / 1000) % 60;
                
        			let time = [days, hours, minutes, seconds];
                
        			for (let x of time) {
        				if (x < 10) {
        					time[time.indexOf(x)] = "0" + String(x);
                        
        				}
        			}
                
        			timerText[0].innerHTML = time[0];
        			timerText[1].innerHTML = time[1];
        			timerText[2].innerHTML = time[2];
        			timerText[3].innerHTML = time[3];
                
        			if (diffTime < 0) {
        				clearInterval(x);
        				timerText[0].innerHTML = "00"; //Force timer to stay at zero
        				timerText[1].innerHTML = "00";
        				timerText[2].innerHTML = "00";
        				timerText[3].innerHTML = "00";
        			}
                
        		}, 1000);
            
        </script>
    </body>
</html>
